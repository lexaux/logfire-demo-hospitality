<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #E520E9;
    --pink-dark: #B819BB;
    --pink-soft: #fce5fc;
    --ink: #1a1d29;
    --muted: #6b7280;
    --line: #e5e7eb;
    --bg: #fafafa;
    --card: #ffffff;
    --ok: #16a34a;
    --warn: #d97706;
    --err: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 20px 24px 32px; }
  .header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .header-text { display: flex; flex-direction: column; }
  .brand-name { font-weight: 600; font-size: 0.82rem; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; margin-top: 2px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 14px; }
  .logo-wrap { width: 48px; height: 48px; flex-shrink: 0; perspective: 600px; }
  .logo { width: 100%; height: 100%; animation: tilt-y 3.6s ease-in-out infinite alternate; transform-style: preserve-3d; transform-origin: 50% 50%; filter: drop-shadow(0 3px 8px rgba(229, 32, 233, 0.3)); }
  .logo-wrap:hover .logo { animation-duration: 1.4s; }
  @keyframes tilt-y {
    from { transform: rotateY(-55deg); }
    to   { transform: rotateY( 55deg); }
  }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 14px; border-bottom: 1px solid var(--line); }
  .tab {
    padding: 6px 14px; cursor: pointer; border: none; background: none;
    font-size: 0.85rem; color: var(--muted); border-bottom: 2px solid transparent;
    margin-bottom: -1px; font-family: inherit; font-weight: 500;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--pink); border-bottom-color: var(--pink); font-weight: 600; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Form */
  .ask-form { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 6px; transition: border-color 0.15s; }
  .ask-form:focus-within { border-color: var(--pink); box-shadow: 0 0 0 4px var(--pink-soft); }
  textarea {
    width: 100%; padding: 12px 14px; border: none; outline: none;
    font-size: 0.95rem; font-family: inherit; color: var(--ink);
    resize: none; min-height: 68px; background: transparent;
  }
  textarea::placeholder { color: #9ca3af; }
  .ask-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 10px 6px 14px; }
  .hint { font-size: 0.75rem; color: var(--muted); }
  button.submit {
    background: var(--pink); color: white; border: none;
    padding: 6px 16px; border-radius: 8px; font-size: 0.85rem;
    cursor: pointer; font-weight: 600; font-family: inherit;
    transition: background 0.15s;
  }
  button.submit:hover:not(:disabled) { background: var(--pink-dark); }
  button.submit:disabled { background: #d1d5db; cursor: not-allowed; }

  .examples { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .example-chip {
    font-size: 0.78rem; padding: 4px 10px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--line);
    color: var(--muted); cursor: pointer; transition: all 0.15s;
    font-family: inherit;
  }
  .example-chip:hover { border-color: var(--pink); color: var(--pink); background: var(--pink-soft); }

  /* Result card */
  .result-card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 16px 18px; margin-top: 14px;
  }
  .result-card h3 { margin-bottom: 10px; font-size: 0.98rem; font-weight: 600; letter-spacing: -0.01em; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .badge {
    padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600;
    text-transform: lowercase; letter-spacing: 0.01em;
  }
  .badge.category { background: var(--pink-soft); color: var(--pink-dark); }
  .badge.priority-P1 { background: #fee2e2; color: var(--err); }
  .badge.priority-P2 { background: #fef3c7; color: var(--warn); }
  .badge.priority-P3 { background: #dcfce7; color: var(--ok); }
  .badge.confidence-high { background: #dcfce7; color: var(--ok); }
  .badge.confidence-medium { background: #fef3c7; color: var(--warn); }
  .badge.confidence-low { background: #fee2e2; color: var(--err); }
  .badge.escalation { background: #fee2e2; color: var(--err); }
  .resolution-text { background: var(--bg); padding: 10px 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.88rem; line-height: 1.5; }
  .meta { font-size: 0.8rem; color: var(--muted); }

  /* Table */
  .tickets-table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; table-layout: fixed; }
  .tickets-table th { background: var(--bg); padding: 12px 14px; text-align: left; font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .tickets-table td { padding: 12px 14px; border-top: 1px solid var(--line); font-size: 0.88rem; }
  .tickets-table tr:hover { background: var(--bg); }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 0.9rem; }

  /* Loading */
  .loading { display: none; align-items: center; gap: 10px; padding: 12px 4px; color: var(--muted); font-size: 0.85rem; }
  .loading.active { display: flex; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--line); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Similar */
  .similar-section { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; }
  .similar-header { cursor: pointer; font-weight: 600; font-size: 0.85rem; color: var(--pink); padding: 4px 0; }
  .similar-header::before { content: '\25b6  '; font-size: 0.65rem; }
  .similar-section.open .similar-header::before { content: '\25bc  '; }
  .similar-body { display: none; margin-top: 8px; }
  .similar-section.open .similar-body { display: block; }
  .similar-card { background: var(--bg); border-radius: 10px; padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--pink); }
  .similar-card-header { margin-bottom: 8px; font-size: 0.88rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .expandable { cursor: pointer; }
  .detail-row { display: none; }
  .detail-row.active { display: table-row; }
  .detail-row td { background: var(--bg); word-wrap: break-word; }

  /* Feedback */
  .feedback { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--muted); }
  .feedback button {
    background: var(--card); border: 1px solid var(--line); border-radius: 6px;
    padding: 3px 10px; cursor: pointer; font-size: 0.9rem; transition: all 0.15s;
  }
  .feedback button:hover:not(:disabled) { border-color: var(--pink); background: var(--pink-soft); }
  .feedback button.selected { background: var(--pink); color: white; border-color: var(--pink); }
  .feedback button:disabled { cursor: default; opacity: 0.5; }
  .feedback .ack { color: var(--ok); font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-wrap" aria-hidden="true">
      <svg class="logo" viewBox="0 0 140 122" xmlns="http://www.w3.org/2000/svg">
        <path fill="#E520E9" d="M137.385 90.65 73.515 2.075c-2.01-2.765-6.645-2.765-8.635 0L1.01 90.65a5.335 5.335 0 0 0 2.65 8.175l63.87 20.91h.01a5.303 5.303 0 0 0 3.3 0h.01l63.87-20.91a5.278 5.278 0 0 0 3.4-3.415 5.263 5.263 0 0 0-.75-4.76h.015ZM69.2 14.28l25.6 35.505-23.94-7.835c-.185-.06-.38-.05-.565-.095a3.502 3.502 0 0 0-.55-.09c-.185-.025-.36-.095-.545-.095-.185 0-.355.07-.54.095a4.245 4.245 0 0 0-.55.09c-.19.035-.385.035-.555.095L43.76 49.74l-.15.05 25.6-35.51h-.01ZM33.03 64.45l27.87-9.13 2.975-.97v52.99l-49.97-16.365L33.03 64.45Zm41.5 42.88V54.35l30.845 10.1L124.5 90.96l-49.975 16.37h.005Z"/>
      </svg>
    </div>
    <div class="header-text">
      <span class="brand-name">Support Agent</span>
      <h1>How can we help?</h1>
    </div>
  </div>

  <p class="subtitle">Describe your issue. An AI agent will investigate and respond.</p>

  <div class="tabs">
    <button class="tab active" data-tab="submit">Ask</button>
    <button class="tab" data-tab="recent">Recent</button>
    <button class="tab" data-tab="resolved">History</button>
  </div>

  <div id="submit" class="tab-content active">
    <form id="ticket-form">
      <div class="ask-form">
        <textarea id="prompt" placeholder="What's going on?" required minlength="10"></textarea>
        <div class="ask-row">
          <span class="hint">Cmd/Ctrl + Enter to submit</span>
          <button type="submit" class="submit" id="submit-btn">Ask</button>
        </div>
      </div>
    </form>

    <div class="examples">
      <button type="button" class="example-chip" data-example="Every time our worker retries a POST to /v1/payment_intents on Stripe with the same idempotency key, we receive two charge.succeeded webhooks. This is double-counting revenue in our reporting.">Duplicate Stripe webhooks</button>
      <button type="button" class="example-chip" data-example="Twilio Verify OTP SMS messages are arriving 2–3 minutes late for Brazilian numbers during peak hours. US and EU numbers are fine. Customers are abandoning login.">Twilio OTP delay</button>
      <button type="button" class="example-chip" data-example="Our SendGrid event webhook handler started returning 401 on roughly 10% of events. Same signing secret as before. The failing messages all contain emoji in the subject line.">SendGrid signature 401</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Investigating…</span>
    </div>

    <div id="result"></div>
  </div>

  <div id="recent" class="tab-content">
    <div id="tickets-list"></div>
  </div>

  <div id="resolved" class="tab-content">
    <div id="resolved-list"></div>
  </div>
</div>

<script type="module">
// --- Browser OpenTelemetry: emits a `feedback` span as a child of the agent's `support_ticket_resolution` span.
// Token is intentionally public for this demo; in prod, vend short-lived tokens server-side.
import { trace, ROOT_CONTEXT, SpanKind } from 'https://esm.sh/@opentelemetry/api@1.9.0';
import { WebTracerProvider } from 'https://esm.sh/@opentelemetry/sdk-trace-web@1.30.1';
import { BatchSpanProcessor } from 'https://esm.sh/@opentelemetry/sdk-trace-base@1.30.1';
import { OTLPTraceExporter } from 'https://esm.sh/@opentelemetry/exporter-trace-otlp-http@0.57.2';
import { Resource } from 'https://esm.sh/@opentelemetry/resources@1.30.1';

let tracer = null;

async function initTelemetry() {
  try {
    const cfg = await (await fetch('/api/config')).json();
    if (!cfg.logfire_write_token) {
      console.warn('LOGFIRE_BROWSER_WRITE_TOKEN not set — feedback spans will not be emitted.');
      return;
    }
    const provider = new WebTracerProvider({
      resource: new Resource({ 'service.name': 'support-agent-frontend' }),
    });
    provider.addSpanProcessor(new BatchSpanProcessor(new OTLPTraceExporter({
      url: cfg.logfire_otlp_endpoint,
      headers: { Authorization: cfg.logfire_write_token },
    })));
    provider.register();
    tracer = trace.getTracer('support-agent-frontend');
  } catch (e) {
    console.warn('Failed to init browser telemetry:', e);
  }
}
initTelemetry();

function emitFeedback(value, ticket) {
  if (!tracer) return;
  // Append to the original agent trace: feedback span is a child of the
  // `support_ticket_resolution` span. OTel groups by trace_id; the parent
  // having already ended is fine. Timeline will show a gap.
  let parentCtx = ROOT_CONTEXT;
  if (ticket.trace_id && ticket.span_id) {
    parentCtx = trace.setSpanContext(ROOT_CONTEXT, {
      traceId: ticket.trace_id,
      spanId: ticket.span_id,
      traceFlags: 1,
      isRemote: true,
    });
  }
  const span = tracer.startSpan('feedback', {
    kind: SpanKind.CLIENT,
    attributes: {
      'feedback.value': value,
      'ticket.id': ticket.id,
      'ticket.integration': ticket.integration || '',
      'ticket.ai_category': ticket.ai_category || '',
      'ticket.ai_priority': ticket.ai_priority || '',
    },
  }, parentCtx);
  span.end();
}

// Detect which integration the user is asking about; the backend needs a
// value but we don't want to expose the choice in the UI. Default: stripe.
function detectIntegration(text) {
  const lower = text.toLowerCase();
  for (const integ of ['stripe', 'twilio', 'sendgrid']) {
    if (lower.includes(integ)) return integ;
  }
  return 'stripe';
}

function deriveSubject(text) {
  const firstLine = text.split('\n')[0].trim();
  return firstLine.length > 80 ? firstLine.slice(0, 77) + '…' : firstLine;
}

// Example chips
document.querySelectorAll('.example-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.getElementById('prompt').value = chip.dataset.example;
    document.getElementById('prompt').focus();
  });
});

// Cmd/Ctrl+Enter to submit
document.getElementById('prompt').addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    document.getElementById('ticket-form').requestSubmit();
  }
});

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'recent') loadTickets();
    if (tab.dataset.tab === 'resolved') loadResolved();
  });
});

// Submit
document.getElementById('ticket-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const loading = document.getElementById('loading');
  const resultDiv = document.getElementById('result');

  const text = document.getElementById('prompt').value.trim();
  if (text.length < 10) return;

  btn.disabled = true;
  loading.classList.add('active');
  resultDiv.innerHTML = '';

  const body = {
    subject: deriveSubject(text),
    description: text,
    integration: detectIntegration(text),
  };

  try {
    const res = await fetch('/api/tickets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Request failed');
    }
    const ticket = await res.json();
    resultDiv.innerHTML = renderResult(ticket);
    wireFeedback(ticket);
  } catch (err) {
    resultDiv.innerHTML = `<div class="result-card"><p style="color:var(--err)">Error: ${err.message}</p></div>`;
  } finally {
    btn.disabled = false;
    loading.classList.remove('active');
  }
});

function renderResult(t) {
  const similarHtml = (t.similar_ticket_ids && t.similar_ticket_ids.length)
    ? `<div class="similar-section">
        <div class="similar-header" onclick="this.parentElement.classList.toggle('open')">
          Related (${t.similar_ticket_ids.length})
        </div>
        <div class="similar-body" id="similar-${t.id}">Loading…</div>
      </div>`
    : '';

  const html = `
    <div class="result-card">
      <h3>${t.subject}</h3>
      <div class="badges">
        <span class="badge category">${t.ai_category}</span>
        <span class="badge priority-${t.ai_priority}">${t.ai_priority}</span>
        <span class="badge confidence-${t.ai_confidence}">${t.ai_confidence} confidence</span>
        ${t.escalation_recommended ? '<span class="badge escalation">escalate</span>' : ''}
      </div>
      <div class="resolution-text">${t.ai_resolution_suggestion}</div>
      <div class="feedback" id="feedback-${t.id}">
        <span>Was this helpful?</span>
        <button data-value="thumbs_up" aria-label="thumbs up">👍</button>
        <button data-value="thumbs_down" aria-label="thumbs down">👎</button>
      </div>
      ${similarHtml}
    </div>`;

  if (t.similar_ticket_ids && t.similar_ticket_ids.length) {
    loadSimilarTickets(t.id, t.similar_ticket_ids);
  }
  return html;
}

function wireFeedback(ticket) {
  const container = document.getElementById(`feedback-${ticket.id}`);
  if (!container) return;
  container.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const value = btn.dataset.value;
      emitFeedback(value, ticket);
      container.querySelectorAll('button').forEach(b => {
        b.disabled = true;
        if (b === btn) b.classList.add('selected');
      });
      const ack = document.createElement('span');
      ack.className = 'ack';
      ack.textContent = 'Thanks — feedback recorded.';
      container.appendChild(ack);
    });
  });
}

async function loadSimilarTickets(ticketId, ids) {
  try {
    const res = await fetch(`/api/tickets/by-ids?ids=${ids.join(',')}`);
    const tickets = await res.json();
    const container = document.getElementById(`similar-${ticketId}`);
    if (!container) return;
    container.innerHTML = tickets.map(s => `
      <div class="similar-card">
        <div class="similar-card-header">
          <strong>#${s.id}</strong> ${s.subject}
          <span class="badge category">${s.ai_category || '-'}</span>
          <span class="badge priority-${s.ai_priority}">${s.ai_priority || '-'}</span>
        </div>
        <div class="resolution-text">${s.ai_resolution_suggestion || 'No resolution available'}</div>
      </div>
    `).join('');
  } catch (err) {
    const container = document.getElementById(`similar-${ticketId}`);
    if (container) container.innerHTML = 'Failed to load.';
  }
}

async function loadTickets() {
  const container = document.getElementById('tickets-list');
  try {
    const res = await fetch('/api/tickets');
    const tickets = await res.json();
    if (tickets.length === 0) {
      container.innerHTML = '<div class="empty-state">Nothing here yet.</div>';
      return;
    }
    container.innerHTML = `
      <table class="tickets-table">
        <thead><tr>
          <th style="width:6%">#</th><th style="width:54%">Subject</th><th style="width:20%">Category</th><th style="width:10%">Priority</th><th style="width:10%">Confidence</th>
        </tr></thead>
        <tbody>
          ${tickets.map(t => `<tr>
            <td>${t.id}</td>
            <td>${t.subject}</td>
            <td><span class="badge category">${t.ai_category || '-'}</span></td>
            <td><span class="badge priority-${t.ai_priority}">${t.ai_priority || '-'}</span></td>
            <td><span class="badge confidence-${t.ai_confidence}">${t.ai_confidence || '-'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (err) {
    container.innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
  }
}

async function loadResolved() {
  const container = document.getElementById('resolved-list');
  try {
    const res = await fetch('/api/tickets/resolved');
    const tickets = await res.json();
    if (tickets.length === 0) {
      container.innerHTML = '<div class="empty-state">No history yet.</div>';
      return;
    }
    container.innerHTML = `
      <table class="tickets-table">
        <thead><tr>
          <th style="width:6%">#</th><th style="width:50%">Subject</th><th style="width:18%">Category</th><th style="width:13%">Priority</th><th style="width:13%">Confidence</th>
        </tr></thead>
        <tbody>
          ${tickets.map(t => `<tr class="expandable" onclick="this.nextElementSibling.classList.toggle('active')">
            <td>${t.id}</td>
            <td>${t.subject}</td>
            <td><span class="badge category">${t.ai_category || '-'}</span></td>
            <td><span class="badge priority-${t.ai_priority}">${t.ai_priority || '-'}</span></td>
            <td><span class="badge confidence-${t.ai_confidence}">${t.ai_confidence || '-'}</span></td>
          </tr>
          <tr class="detail-row">
            <td colspan="5"><div class="resolution-text">${t.ai_resolution_suggestion || '-'}</div></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (err) {
    container.innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
  }
}
</script>
</body>
</html>
