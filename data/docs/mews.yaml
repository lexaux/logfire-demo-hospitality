system: mews
display_name: Mews PMS

supported:
  - title: "Listing Sync"
    items:
      - "Two-way listing sync for name, address, photos"
      - "Custom fields synced via webhook on property update"
      - "WiFi credentials pushed to guest platform on check-in"
  - title: "Reservation & Guest Sync"
    items:
      - "Real-time webhook on reservation create/update/cancel"
      - "Guest name, email, phone synced on check-in event"
      - "Payment status synced (paid/unpaid/partial)"
      - "OTA confirmation code (Airbnb) passed through booking_source field"
      - "Check-in and check-out dates/times synced bidirectionally"
  - title: "Messaging"
    items:
      - "Canary: full two-way message sync, attachments supported"
      - "Duve: outbound messages synced, inbound via polling (5 min delay)"
      - "Roomkey: outbound only, no inbound sync"

partial:
  - title: "Listing Sync Quirks"
    items:
      - "Nickname field not synced — use display_name instead"
      - "Photo order may differ between Mews and guest platform"
  - title: "Reservation Sync Quirks"
    items:
      - "Early check-in upsell status not synced — requires manual config in guest platform"
      - "Guest notes field truncated to 500 chars on sync"
      - "Group bookings sync as individual reservations (no group linking)"
  - title: "Messaging Quirks"
    items:
      - "Message templates must be re-created in guest platform — not synced from Mews"
      - "Scheduled messages may fire based on PMS timezone, not property timezone"

not_supported:
  - title: "Features Not Available"
    items:
      - "Rate/pricing sync not available — manage rates in Mews only"
      - "Housekeeping status not synced to guest platform"
      - "Multi-property rollup views not supported in integration"
      - "Bulk operations (mass check-in/check-out) not exposed via API"

known_bugs:
  - title: "Active Issues"
    items:
      - "BUG-M001: Webhook fires twice on rapid reservation update — deduplicate on reservation_id + updated_at"
      - "BUG-M002: Guest email occasionally null on walk-in bookings — fallback to phone lookup"
      - "BUG-M003: Check-in event delayed up to 2 min during high-load periods (>50 concurrent check-ins)"
