# Seeded resolved tickets — loaded once into the DB on first startup so the
# "find_similar_tickets" tool has prior cases to draw on. Re-seed by deleting
# data/tickets.db (or `make reset-db`) and restarting the app.

- subject: Duplicate charge.succeeded webhooks on retried POST
  description: We're seeing two charge.succeeded webhooks fire for the same payment when our worker retries
    a POST to /v1/payment_intents with the same idempotency key. Causing double-counted revenue in our reporting.
  integration: stripe
  ai_category: bug
  ai_priority: P1
  ai_confidence: high
  ai_resolution_suggestion: 'This is known bug BUG-S001. Deduplicate incoming webhooks on event.id rather
    than on payment_intent.id or charge.id. Stripe retries delivery on at-least-once semantics and the same
    event.id will repeat on each retry.'
  resolution_notes: Added event.id dedupe table with 7-day TTL. Duplicate webhook impact dropped to 0%.
  source_docs_referenced:
  - stripe
  escalation_recommended: false

- subject: payment_method.detached event missing customer field
  description: When a customer removes their default card via our portal, the payment_method.detached
    webhook arrives but the customer field is null. We can't route the cleanup to the right account.
  integration: stripe
  ai_category: bug
  ai_priority: P2
  ai_confidence: high
  ai_resolution_suggestion: 'Known issue BUG-S002. On detachment of the default payment method, customer
    is occasionally omitted from the event payload. Workaround: re-fetch the payment method via
    GET /v1/payment_methods/{id} which returns the prior customer association.'
  resolution_notes: Implemented re-fetch fallback. Customer attribution recovered for 100% of detached events.
  source_docs_referenced:
  - stripe
  escalation_recommended: false

- subject: ACH bank transfer not marked as paid for 4 days
  description: Customer paid via ACH on Monday but our system still shows the invoice as outstanding on
    Friday. The charge object exists in Stripe but charge.succeeded never fired.
  integration: stripe
  ai_category: config
  ai_priority: P2
  ai_confidence: high
  ai_resolution_suggestion: ACH transfers settle 3-5 business days after initiation. The charge.succeeded
    webhook fires only after the bank confirms settlement, not at initiation. Surface an "Initiated, awaiting
    settlement" state in your UI for ACH payments and treat them as paid only on the succeeded event.
  resolution_notes: Added pending-settlement state to invoice UI. Support escalations on ACH dropped by ~80%.
  source_docs_referenced:
  - stripe
  escalation_recommended: false

- subject: Cannot pay out to sub-merchants from Standard account
  description: We want to split each charge between us and a partner. Our current Stripe Standard account
    doesn't expose the destination parameter on the charge — is this supported?
  integration: stripe
  ai_category: not_supported
  ai_priority: P3
  ai_confidence: high
  ai_resolution_suggestion: Sub-merchant payouts are not available in Stripe Standard accounts. The destination
    and on_behalf_of parameters require a Stripe Connect account (Express, Custom, or full Standard Connect).
    Migrate to Connect or handle splits via Stripe Treasury / manual transfers.
  resolution_notes: Customer migrated to Stripe Connect Express. Sub-merchant payouts now flowing.
  source_docs_referenced:
  - stripe
  escalation_recommended: false

- subject: Twilio status callbacks arriving out of order
  description: We're receiving the "delivered" status callback before the "sent" callback for the same SMS
    SID. Our state machine flips back to "sent" after marking the message delivered.
  integration: twilio
  ai_category: bug
  ai_priority: P2
  ai_confidence: high
  ai_resolution_suggestion: 'Known issue BUG-T001. Status callbacks are not strictly ordered by arrival time.
    Sort transitions by the date_updated field on the message rather than by webhook arrival, and ignore
    transitions that move state backwards.'
  resolution_notes: Updated state machine to use date_updated as authoritative ordering. Backward-transition
    bug eliminated.
  source_docs_referenced:
  - twilio
  escalation_recommended: false

- subject: Twilio SMS billing higher than expected for unicode messages
  description: Our message templates include the € symbol and curly braces. We're being charged for 2 segments
    even when the message is short enough to fit in 1.
  integration: twilio
  ai_category: billing
  ai_priority: P3
  ai_confidence: high
  ai_resolution_suggestion: 'Known accounting quirk BUG-T002. Characters in the GSM-7 Extended Table (€, {, },
    [, ], ~, ^, |, \\) each count as 2 characters for segment calculation, even though the message looks
    short. Either avoid these characters in templates or budget for the higher per-message cost.'
  resolution_notes: Replaced € with EUR and curly braces with parens in templates. Per-message cost reduced
    ~35%.
  source_docs_referenced:
  - twilio
  escalation_recommended: false

- subject: Twilio Verify OTP arriving 2+ minutes late in Brazil
  description: Customers in Brazil are reporting OTP SMS taking 2-3 minutes to arrive during peak hours.
    US and EU numbers work fine. Login conversion is dropping.
  integration: twilio
  ai_category: sync_issue
  ai_priority: P2
  ai_confidence: medium
  ai_resolution_suggestion: 'Known regional issue BUG-T003. Brazilian carrier delivery is delayed >2 min
    during peak hours due to upstream queue backlog. Recommended workaround: fall back to the voice channel
    for BR numbers via the Verify API channel parameter when SMS exceeds 30s.'
  resolution_notes: Added voice fallback for Brazilian numbers after 30s SMS timeout. Login completion in
    BR recovered to ~95%.
  source_docs_referenced:
  - twilio
  escalation_recommended: true

- subject: Bulk SMS rejected without an A2P 10DLC campaign
  description: We're sending notification SMS to 10,000+ US numbers and Twilio is returning 30007 errors.
    These worked fine 6 months ago.
  integration: twilio
  ai_category: config
  ai_priority: P1
  ai_confidence: high
  ai_resolution_suggestion: Bulk SMS to US numbers now requires a registered Messaging Service with A2P
    10DLC campaign registration. US carriers enforce this for all application-to-person traffic. Register
    a brand and campaign in the Twilio console; approval takes 1-3 business days. Use a toll-free or
    short code as a stopgap.
  resolution_notes: Registered A2P 10DLC campaign for the brand. Bulk send throughput restored after 2 days.
  source_docs_referenced:
  - twilio
  escalation_recommended: true

- subject: SendGrid event webhook signature verification failing
  description: Our event webhook handler started rejecting payloads with 401 last week. Same secret as
    before. We noticed it happens on messages containing emoji in the subject line.
  integration: sendgrid
  ai_category: bug
  ai_priority: P1
  ai_confidence: high
  ai_resolution_suggestion: 'Known bug BUG-G001. Event webhook signatures fail when the payload contains
    unicode emoji because SendGrid signs the normalized form but transports the raw bytes. Workaround:
    normalize the request body to NFC (unicodedata.normalize(''NFC'', body)) before computing the verification
    signature.'
  resolution_notes: Added NFC normalization step before Ed25519 verification. Webhook rejection rate fell
    from 12% to 0%.
  source_docs_referenced:
  - sendgrid
  escalation_recommended: true

- subject: Click events firing twice for the same link
  description: Our analytics shows double click-throughs on every email link. Looking at the event webhook
    payloads, we receive two click events with the same sg_event_id within ~80ms of each other.
  integration: sendgrid
  ai_category: bug
  ai_priority: P3
  ai_confidence: high
  ai_resolution_suggestion: 'Known issue BUG-G002. Click events occasionally duplicate within a ~100ms window.
    Deduplicate by sg_event_id with a 5s window before counting click-throughs in analytics.'
  resolution_notes: Added sg_event_id dedupe in analytics ingestion. Click counts now match expected ratios.
  source_docs_referenced:
  - sendgrid
  escalation_recommended: false

- subject: Suppression list bulk import losing some emails
  description: We uploaded a 50k-row suppression CSV but the list only shows 49,732 entries afterwards.
    No error returned. The missing entries appear random.
  integration: sendgrid
  ai_category: bug
  ai_priority: P2
  ai_confidence: high
  ai_resolution_suggestion: 'Known bug BUG-G003. Suppression list bulk import silently drops emails with
    leading or trailing whitespace. Trim every row before upload (strip on email field) and re-upload
    the dropped entries.'
  resolution_notes: Added trim step to upload pipeline. Re-import recovered all 268 missing entries.
  source_docs_referenced:
  - sendgrid
  escalation_recommended: false

- subject: BIMI logo not appearing in Gmail
  description: We set up BIMI on our sending domain and have a valid SVG hosted on our server, but the logo
    is not appearing next to messages in Gmail or Yahoo Mail.
  integration: sendgrid
  ai_category: not_supported
  ai_priority: P3
  ai_confidence: high
  ai_resolution_suggestion: BIMI logo display in major mailbox providers (Gmail, Yahoo, Apple Mail) requires
    a Verified Mark Certificate (VMC) issued by a trusted CA. SVG alone is not sufficient. Purchase a VMC
    through DigiCert or Entrust (~$1,500/yr) and reference it via the l= and a= tags in your BIMI DNS record.
  resolution_notes: Customer acquired a VMC. BIMI logo now showing in Gmail within 48h of DNS propagation.
  source_docs_referenced:
  - sendgrid
  escalation_recommended: false
