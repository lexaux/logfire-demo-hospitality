- subject: Mews webhook duplicate reservation events
  description: We're receiving duplicate webhook events every time a reservation is updated in Mews. The second event arrives
    within 1-2 seconds of the first. This is causing duplicate guest records in the guest platform.
  pms_system: mews
  ai_category: bug
  ai_priority: P1
  ai_confidence: high
  ai_resolution_suggestion: This is a known bug (BUG-M001). Deduplicate incoming webhooks by checking reservation_id + updated_at
    timestamp. Discard events where both fields match a recently processed event within a 5-second window.
  resolution_notes: Implemented deduplication filter on webhook handler. Issue resolved after deploying idempotency check
    on reservation_id + updated_at.
  source_docs_referenced:
  - mews
  escalation_recommended: false
